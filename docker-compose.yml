services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest # Έτοιμο image από τη Microsoft για SQL Server 2022
    container_name: schoolrest9-db                     # Σταθερό όνομα του container για ευκολότερη αναφορά
    environment:                                      
      ACCEPT_EULA: "Y"                                # αποδοχή license
      MSSQL_SA_PASSWORD: "${SA_PASSWORD:-YourDefaultPassword}"             # password από το .env
    ports:
      - "${DB_PORT:-1437}:1433"                       # port mapping - host port από .env ή default 1437, container port 1433 (default SQL Server port)
    volumes:
      - sqlserver-data:/var/opt/mssql                 
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -C -Q "SELECT 1"
      interval: 10s
      timeout: 5s
      retries: 5

